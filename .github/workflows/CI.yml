name: portfolio CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_HUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio:${{ github.sha }} \
                       -t ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio:${{ github.sha }}
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/portfolio:latest
  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/portfolio \
            portfolio=${{ secrets.DOCKER_HUB_USERNAME }}/portfolio:${{ github.sha }} \
            --namespace portfolio
          kubectl rollout status deployment/portfolio \
            --namespace portfolio \
            --timeout=120s

      - name: Clean up kubeconfig
        if: always()
        run: rm -f ~/.kube/config
